<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Users</title>

<style>
body {
  margin: 0;
  padding: 20px;
  font-family: Arial;
  background: #f8fafc;
}

h2 {
  margin-bottom: 20px;
  color: #1e293b;
}

/* FORM */
.form {
  margin-bottom: 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

input, select {
  padding: 10px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  outline: none;
}

button {
  padding: 10px 14px;
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

/* CARD */
.card {
  padding: 10px;
  background: #f1f5f9;
  margin-bottom: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<h2>Manage Users</h2>

<!-- ADD USER FORM -->
<div class="form">

  <input id="name" placeholder="Name" />
  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <select id="role">
    <option value="student">Student</option>
    <option value="department">Department</option>
    <option value="admin">Admin</option>
  </select>

  <button onclick="addUser()">Add User</button>

</div>

<!-- LIST -->
<div id="users"></div>

<script>

let users = [];

// FETCH USERS
function fetchUsers() {
  fetch("http://localhost:8081/web-project/web-project-php/backend/index.php?action=users")
    .then(res => res.json())
    .then(data => {
      users = data || [];
      render();
    });
}

fetchUsers();

// ADD USER
async function addUser() {

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;

  await fetch("http://localhost:8081/web-project/web-project-php/backend/index.php?action=add_user", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, email, password, role })
  });

  fetchUsers();
}

// RENDER USERS
function render() {

  const container = document.getElementById("users");

  container.innerHTML = "";

  users.forEach(u => {
    container.innerHTML += `
      <div class="card">
        ${u.name} (${u.role})
      </div>
    `;
  });
}

</script>

</body>
</html>
