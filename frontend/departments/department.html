<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Department Dashboard</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: #f4f6fb;
}

/* WRAPPER */
.wrapper {
  display: flex;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: linear-gradient(180deg,#111827,#0f172a);
  color: #fff;
  padding: 20px;
  box-shadow: 2px 0 15px rgba(0,0,0,0.2);
}

.brand {
  margin-bottom: 25px;
}

.logo {
  margin: 0;
  font-weight: 800;
}

.subLogo {
  font-size: 12px;
  color: #94a3b8;
}

.profile {
  margin-bottom: 20px;
  font-size: 14px;
  color: #cbd5e1;
}

.menuBtn {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  background: transparent;
  border: 1px solid #334155;
  color: #fff;
  border-radius: 8px;
  cursor: pointer;
  text-align: left;
}

.activeBtn {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  background: #2563eb;
  border: none;
  color: #fff;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  text-align: left;
}

.logout {
  width: 100%;
  padding: 12px;
  margin-top: 20px;
  background: #ef4444;
  border: none;
  color: #fff;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
}

/* MAIN */
.main {
  flex: 1;
  padding: 30px;
}

.pageTitle {
  margin: 0;
  color: #1e293b;
}

.pageSub {
  margin: 0;
  font-size: 13px;
  color: #64748b;
}

.empty {
  color: #64748b;
}

/* CARD */
.card {
  background: #fff;
  padding: 18px;
  border-radius: 14px;
  margin-bottom: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
  border: 1px solid #eef2f7;
}

.topRow {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.student {
  margin: 0;
}

.meta {
  margin: 0;
  font-size: 12px;
  color: #64748b;
}

.badge {
  color: #fff;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}

.actions {
  margin-top: 12px;
  display: flex;
  gap: 10px;
}

.approve {
  padding: 8px 14px;
  background: #16a34a;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.reject {
  padding: 8px 14px;
  background: #dc2626;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* MODAL */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
}

.modalBox {
  width: 400px;
  background: #fff;
  padding: 20px;
  border-radius: 12px;
}

.input {
  width: 100%;
  height: 100px;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #e5e7eb;
}

.modalFooter {
  margin-top: 12px;
  display: flex;
  justify-content: space-between;
}

.cancelBtn {
  padding: 8px 14px;
  background: #e5e7eb;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.submitBtn {
  padding: 8px 14px;
  background: #dc2626;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>


</head>

<body>
   
    <div class="wrapper">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="brand">
      <h2 class="logo">ASTU Dept</h2>
      <p class="subLogo">Clearance Panel</p>
    </div>

    <div class="profile" id="profile"></div>

    <button id="pendingBtn" class="activeBtn" onclick="setTab('pending')">
       Pending Requests
    </button>

    <button id="reviewedBtn" class="menuBtn" onclick="setTab('reviewed')">
       Reviewed Requests
    </button>

    <button class="logout" onclick="logout()"> Logout</button>

  </div>

  <!-- MAIN -->
  <div class="main">

    <h2 class="pageTitle" id="title">Pending Requests</h2>
    <p class="pageSub">Manage student clearance approvals</p>

    <div id="content"></div>

  </div>
</div>


<!-- MODAL -->
<div id="modal" class="overlay" style="display:none;">
  <div class="modalBox">

    <h3>Reject Request</h3>
    <p style="font-size:13px;color:#64748b;">Provide a clear reason</p>

    <textarea id="comment" class="input"></textarea>

    <div class="modalFooter">
      <button class="cancelBtn" onclick="closeModal()">Cancel</button>
      <button class="submitBtn" onclick="submitReject()">Submit</button>
    </div>

  </div>
</div>



<script>
const user = JSON.parse(localStorage.getItem("user")) || {};

if (!user.id) {
  window.location.href = "../login.html";
}

document.getElementById("profile").innerText = "👤 " + user.name;

let tab = "pending";
let requests = [];
let selectedApproval = null;

// fetch
function fetchRequests() {
  fetch(`http://localhost:8081/webb-project/web-project-php/backend/index.php?action=dept_requests&department_id=${user.department_id}`)
    .then(res => res.json())
    .then(data => {
      requests = data || [];
      render();
    });
}

fetchRequests();

// tab switch
function setTab(t) {
  tab = t;

  document.getElementById("pendingBtn").className =
    t === "pending" ? "activeBtn" : "menuBtn";

  document.getElementById("reviewedBtn").className =
    t === "reviewed" ? "activeBtn" : "menuBtn";

  document.getElementById("title").innerText =
    t === "pending" ? "Pending Requests" : "Reviewed Requests";

  render();
}

// render
function render() {

  let filtered =
    tab === "pending"
      ? requests.filter(r => r.status === "pending")
      : requests.filter(r => r.status !== "pending");

  const container = document.getElementById("content");

  if (filtered.length === 0) {
    container.innerHTML = `<p class="empty">No requests found</p>`;
    return;
  }

  let html = "";

  filtered.forEach(r => {

    html += `
      <div class="card">

        <div class="topRow">
          <div>
            <h3 class="student">${r.student_name}</h3>
            <p class="meta">Request ID: #${r.request_id}</p>
          </div>

          <span class="badge" style="background:${
            r.status === "approved" ? "#16a34a" :
            r.status === "rejected" ? "#dc2626" :
            "#f59e0b"
          }">
            ${r.status.toUpperCase()}
          </span>
        </div>

        ${r.status === "pending" ? `
        <div class="actions">
          <button class="approve" onclick="approve(${r.approval_id})">✔ Approve</button>
          <button class="reject" onclick="openModal(${r.approval_id})">✖ Reject</button>
        </div>
        ` : ""}

      </div>
    `;
  });

  container.innerHTML = html;
}

// approve
function approve(id) {
  updateStatus(id, "approved");
}

// modal
function openModal(id) {
  selectedApproval = id;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("comment").value = "";
}

// submit reject
function submitReject() {
  const comment = document.getElementById("comment").value;

  if (!comment.trim()) return;

  updateStatus(selectedApproval, "rejected", comment);

  closeModal();
}

// update backend
function updateStatus(id, status, comment = null) {

  fetch("http://localhost:8081/webb-project/web-project-php/backend/index.php?action=dept_update", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      approval_id: id,
      status,
      comment
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.status === "success") {
      fetchRequests();
    }
  });
}

// logout
function logout() {
  localStorage.clear();
  window.location.href = "../login.html";
}
</script>

</body>
</html>
