<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Requests</title>

<!-- jsPDF CDN (IMPORTANT) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg,#eef2f7,#dbeafe);
  display: flex;
  justify-content: center;
  padding: 40px;
  font-family: "Segoe UI", Arial;
}

.container {
  width: 700px;
}

.topHeader {
  text-align: center;
  margin-bottom: 25px;
}

.title {
  margin-bottom: 5px;
  color: #1e293b;
  font-weight: 800;
}

.subtitle {
  font-size: 14px;
  color: #64748b;
}

.empty {
  text-align: center;
  color: #64748b;
  margin-top: 20px;
}

.card {
  background: #ffffff;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 18px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  border: 1px solid #eef2f7;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.reqTitle {
  margin: 0;
  color: #1e293b;
}

.reqSub {
  margin: 2px 0 0 0;
  font-size: 12px;
  color: #94a3b8;
}

.badge {
  color: #fff;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.progressSection {
  margin-top: 10px;
  margin-bottom: 12px;
}

.bar {
  height: 10px;
  background: #e5e7eb;
  border-radius: 10px;
  overflow: hidden;
}

.fill {
  height: 100%;
  background: linear-gradient(to right,#2563eb,#1d4ed8);
}

.progressText {
  font-size: 12px;
  margin-top: 6px;
  color: #64748b;
}

.box {
  background: #f8fafc;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid #e5e7eb;
}

.depName {
  font-size: 14px;
  color: #334155;
}

.smallBadge {
  color: #fff;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  text-transform: capitalize;
}

.btn {
  margin-top: 14px;
  width: 100%;
  padding: 12px;
  background: linear-gradient(to right,#16a34a,#22c55e);
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
}
</style>
</head>

<body>

<div class="container">

  <div class="topHeader">
    <h2 class="title">📄 My Clearance Requests</h2>
    <p class="subtitle">Track your clearance progress in real time</p>
  </div>

  <div id="content"></div>

</div>

<script>
const { jsPDF } = window.jspdf;
const user = JSON.parse(localStorage.getItem("user")) || {};

// protect page
if (!user.id) {
  window.location.href = "login.html";
}

// fetch data
fetch(`http://localhost:8081/webb-project/web-project-php/backend/index.php?action=requests&student_id=${user.id}`)
  .then(res => res.json())
  .then(data => render(Array.isArray(data) ? data : []))
  .catch(() => render([]));

// render function
function render(requests) {
  const container = document.getElementById("content");

  if (requests.length === 0) {
    container.innerHTML = `<p class="empty">No clearance requests found</p>`;
    return;
  }

  let html = "";

  requests.forEach(r => {

    const approved = Number(r.approved || 0);
    const total = Number(r.total || 0);
    const progress = total === 0 ? 0 : (approved / total) * 100;
    const completed = total > 0 && approved === total;

    let deptHTML = "";

    if (r.departments) {
      r.departments.forEach(d => {
        let color =
          d.status === "approved" ? "#16a34a" :
          d.status === "rejected" ? "#dc2626" :
          "#f59e0b";

        deptHTML += `
          <div class="row">
            <span class="depName">${d.name}</span>
            <span class="smallBadge" style="background:${color}">
              ${d.status}
            </span>
          </div>
        `;
      });
    }

    html += `
      <div class="card">

        <div class="header">
          <div>
            <h3 class="reqTitle">Request #${r.id}</h3>
            <p class="reqSub">Clearance tracking details</p>
          </div>

          <span class="badge" style="background:${completed ? "#16a34a" : "#f59e0b"}">
            ${completed ? "Approved" : "Pending"}
          </span>
        </div>

        <div class="progressSection">
          <div class="bar">
            <div class="fill" style="width:${progress}%"></div>
          </div>
          <div class="progressText">
            ${approved} / ${total} Departments Approved
          </div>
        </div>

        <div class="box">
          ${deptHTML}
        </div>

        ${completed ? `<button class="btn" onclick="downloadPDF(${r.id})">Download Clearance Certificate</button>` : ""}

      </div>
    `;
  });

  container.innerHTML = html;

  // store requests globally for PDF use
  window.requestsData = requests;
}

// PDF function
function downloadPDF(id) {
    const r = window.requestsData.find(x => x.id == id);
 const doc = new jsPDF();

    const pageWidth = doc.internal.pageSize.getWidth();

    // ===== BORDER =====
    doc.setDrawColor(30, 58, 138);
    doc.setLineWidth(1.2);
    doc.rect(10, 10, 190, 277);

    // ===== WATERMARK =====
    doc.setTextColor(240);
    doc.setFontSize(40);
    doc.setFont("helvetica", "bold");
    doc.text("ASTU", 105, 160, { align: "center", angle: 45 });

    doc.setTextColor(0);

    // ===== HEADER =====
    doc.setFontSize(18);
    doc.setFont("helvetica", "bold");
    doc.text("CLEARANCE CERTIFICATE", pageWidth / 2, 30, { align: "center" });

    doc.setFontSize(12);
    doc.setFont("helvetica", "normal");
    doc.text("Adama Science and Technology University", pageWidth / 2, 38, { align: "center" });

    doc.setLineWidth(0.5);
    doc.line(20, 45, 190, 45);

    // ===== CERTIFICATE NUMBER =====
    doc.setFontSize(10);
    doc.text(`Certificate No: ASTU-CLR-${r.id}`, 20, 55);
    doc.text(`Date: ${new Date().toLocaleDateString()}`, 150, 55);

    // ===== STUDENT INFO =====
    doc.setFontSize(12);
    doc.setFont("helvetica", "bold");
    doc.text("STUDENT DETAILS", 20, 75);

    doc.setFont("helvetica", "normal");
    doc.text(`Full Name: ${user.name}`, 20, 88);
    doc.text(`Request ID: ${r.id}`, 20, 98);
    doc.text(`Student Reference: ASTU-${r.id}`, 20, 108);

    // ===== STATUS BOX =====
    doc.setFillColor(34, 197, 94);
    doc.roundedRect(20, 120, 170, 18, 3, 3, "F");

    doc.setTextColor(255);
    doc.setFont("helvetica", "bold");
    doc.text("FULLY CLEARED / APPROVED", pageWidth / 2, 132, { align: "center" });

    doc.setTextColor(0);

    // ===== BODY TEXT =====
    doc.setFontSize(11);
    doc.setFont("helvetica", "normal");

    doc.text(
      "This is to certify that the student has successfully completed all clearance requirements",
      20,
      150
    );

    doc.text(
      "across all departments of Adama Science and Technology University.",
      20,
      160
    );

    doc.text(
      "There are no pending obligations or restrictions remaining in the system.",
      20,
      175
    );

    // ===== SIGNATURE SECTION =====
    doc.setFont("helvetica", "bold");
    doc.text("AUTHORIZATION", 20, 200);

    doc.setFont("helvetica", "normal");
    doc.text("______________________________", 20, 215);
    doc.text("Registrar Office Signature", 20, 225);

    doc.text("Official University Stamp", 140, 225);

    // ===== FOOTER =====
    doc.setFontSize(10);
    doc.setTextColor(120);
    doc.text(
      "This is a system-generated official document and does not require physical signature verification.",
      pageWidth / 2,
      260,
      { align: "center" }
    );

    doc.text(
      `Verification ID: ASTU-VERIFY-${r.id}-${Date.now()}`,
      pageWidth / 2,
      270,
      { align: "center" }
    );

    doc.save(`ASTU_Clearance_${r.id}.pdf`);
  // const r = window.requestsData.find(x => x.id == id);

  // const doc = new jsPDF();

  // doc.setDrawColor(30, 58, 138);
  // doc.rect(10, 10, 190, 277);

  // doc.setTextColor(240);
  // doc.setFontSize(40);
  // doc.text("ASTU", 105, 160, { align: "center", angle: 45 });

  // doc.setTextColor(0);

  // doc.setFontSize(18);
  // doc.text("CLEARANCE CERTIFICATE", pageWidth / 2, 30, { align: "center" });

  // doc.setFontSize(12);
  // doc.text("Adama Science and Technology University", pageWidth / 2, 38, { align: "center" });

  // doc.line(20, 45, 190, 45);

  // doc.setFontSize(10);
  // doc.text(`Certificate No: ASTU-CLR-${r.id}`, 20, 55);
  // doc.text(`Date: ${new Date().toLocaleDateString()}`, 150, 55);

  // doc.setFontSize(12);
  // doc.text(`Full Name: ${user.name}`, 20, 88);
  // doc.text(`Request ID: ${r.id}`, 20, 98);

  // doc.setFillColor(34, 197, 94);
  // doc.rect(20, 120, 170, 18, "F");

  // doc.setTextColor(255);
  // doc.text("FULLY CLEARED / APPROVED", pageWidth / 2, 132, { align: "center" });

  // doc.save(`ASTU_Clearance_${r.id}.pdf`);
}
</script>

</body>
</html>
