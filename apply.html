<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apply Clearance</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#667eea,#764ba2);
  font-family: Arial;
}

.card {
  width: 420px;
  padding: 30px;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  text-align: center;
}

.icon {
  font-size: 40px;
  margin-bottom: 10px;
}

.title {
  margin-bottom: 10px;
  color: #1e293b;
}

.desc {
  color: #555;
  font-size: 14px;
  margin-bottom: 20px;
}

.infoBox {
  text-align: left;
  background: #f8fafc;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 20px;
  font-size: 14px;
}

.btn {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.back {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  background: #e5e7eb;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">

  <div class="icon">🎓</div>

  <h2 class="title">Clearance Request</h2>

  <p class="desc">
    Submit your request to all university departments for approval.
  </p>

  <div class="infoBox">
    <p>✔ Library Department</p>
    <p>✔ Finance Department</p>
    <p>✔ Registrar Office</p>
  </div>

  <button class="btn" onclick="apply()">Submit Request</button>

  <button class="back" onclick="goBack()">Back to Dashboard</button>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user")) || {};

// protect page
if (!user.id) {
  window.location.href = "login.html";
}

async function apply() {

  const res = await fetch(
    "http://localhost:8081/webb-project/web-project-php/backend/index.php?action=apply",
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ student_id: user.id })
    }
  );

  const data = await res.json();
  alert(data.message);
}

function goBack() {
  window.location.href = "student.html";
}
</script>

</body>
</html>
