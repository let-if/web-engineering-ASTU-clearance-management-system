
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - ASTU Clearance</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "Segoe UI", Arial;
  background: linear-gradient(135deg,#1e3a8a,#2563eb,#6366f1);
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.15);
}

.card {
  position: relative;
  width: 360px;
  padding: 30px;
  border-radius: 16px;
  background: #fff;
  box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  text-align: center;
  z-index: 2;
}

.title {
  margin-bottom: 5px;
  font-weight: 800;
  color: #1e293b;
}

.subtitle {
  font-size: 14px;
  color: #64748b;
  margin-bottom: 20px;
}

.input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  outline: none;
}

.btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: linear-gradient(to right,#2563eb,#1d4ed8);
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.link {
  margin-top: 12px;
  color: #2563eb;
  cursor: pointer;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">
  <h2 class="title">Welcome Back 👋</h2>
  <p class="subtitle">Login to ASTU Clearance System</p>

  <input id="email" class="input" placeholder="Email Address" />
  <input id="password" type="password" class="input" placeholder="Password" />

  <button class="btn" onclick="login()">Login</button>

  <p class="link" onclick="goToRegister()">Create new account</p>
</div>

<script>
async function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(
    "http://localhost:8081/webb-project/web-project-php/backend/index.php?action=login",
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    }
  );

  const data = await res.json();

  if (data.status === "success") {

    localStorage.setItem("user", JSON.stringify(data.user));

    // ✅ FIXED ROUTES (IMPORTANT)
    if (data.user.role === "student") {
      window.location.href = "students/student.html";
    } 
    else if (data.user.role === "department") {
      window.location.href = "departments/department.html";
    } 
    else {
      window.location.href = "admin/admin.html";
    }

  } else {
    alert(data.message);
  }
}

function goToRegister() {
  window.location.href = "register.html";
}
</script>

</body>
</html>
